name: Deploy

# Auto-deploy persona-api, persona-voice AND the self-hosted LiveKit SFU to Fly.
# Fires only when the CI workflow finishes successfully on the `main` branch —
# never on PRs, never on a red build. Vercel handles persona-web deploys via its
# own GitHub integration; open-persona-db (self-hosted Postgres) is deployed once
# out-of-band, not here. open-persona-livekit's app + dedicated IPv4 + LIVEKIT_KEYS
# secret are provisioned once out-of-band; this workflow only redeploys its image.
#
# One-time setup:
#   1. Generate a deploy-scoped Fly token. The api job and the voice job both
#      read `secrets.FLY_API_TOKEN`, so it MUST be authorised for BOTH apps.
#      An app-scoped token (`-a open-persona-api`) CANNOT deploy voice and the
#      voice job will 401. Create an ORG-scoped deploy token instead:
#        flyctl tokens create deploy -x 2160h
#      (no `-a` flag → scoped to the org, usable for every app in it). 2160h =
#      90-day expiry. Copy the full `FlyV1 …` value it prints.
#   2. GitHub → repo Settings → Secrets and variables → Actions →
#      "New repository secret" named FLY_API_TOKEN, paste the `FlyV1 …` value.
#      (If FLY_API_TOKEN already exists app-scoped to open-persona-api, use
#      "Update" to overwrite it with the org-scoped token from step 1 —
#      otherwise the voice deploy authenticates as nobody and fails.)
#   3. (Optional) Add `workflow_dispatch` runs to manually re-deploy from the
#      Actions tab without pushing a commit.

on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]
  # Allow manual re-deploy from the Actions tab without a code change.
  workflow_dispatch:

jobs:
  deploy-api:
    # Only deploy when the upstream CI run was a success (or when triggered
    # manually via workflow_dispatch — github.event.workflow_run is null then).
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    concurrency:
      # Serialise deploys: a slow build can't be overtaken by a faster newer one.
      group: deploy-api
      cancel-in-progress: false
    steps:
      - name: Checkout the commit CI verified
        uses: actions/checkout@v4
        with:
          # When triggered by workflow_run, default checkout would be the
          # default branch tip; pin to the exact SHA that just passed CI so a
          # deploy can never race ahead of its checks.
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - uses: superfly/flyctl-actions/setup-flyctl@master

      # Remote build — Fly's builders are tuned for this and CI runners don't
      # need to pay the local Docker disk cost. `.dockerignore` keeps the
      # build context tiny (~5 MB) so the upload to Fly's builder is fast.
      #
      # fly.toml lives at ``packages/api/fly.toml`` (next to the Dockerfile),
      # tracked in git. The earlier ``deploy/fly.toml`` location was excluded
      # by the ``deploy/*`` gitignore rule and so was absent on CI runners —
      # flyctl logged ``Validating --config path unset--`` and then failed
      # the build with a phantom dockerfile path. Co-locating fly.toml with
      # the Dockerfile lets flyctl resolve ``dockerfile = "Dockerfile"``
      # naturally (relative to fly.toml's directory). $WORKSPACE
      # (= ``github.workspace``, system-provided) makes the ``--config`` path
      # absolute, and the workflow's CWD is the repo root (default) so the
      # build daemon receives the full workspace tree as build context — the
      # Dockerfile's ``COPY packages/<member>/...`` paths require that.
      - name: flyctl deploy
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          WORKSPACE: ${{ github.workspace }}
        run: |
          flyctl deploy \
            --remote-only \
            --config "$WORKSPACE/packages/api/fly.toml" \
            --app open-persona-api \
            --strategy rolling \
            --wait-timeout 600

      - name: Smoke-test /healthz
        run: |
          # Give the new machine a moment to settle, then verify the public URL.
          for i in 1 2 3 4 5 6; do
            if curl -fsS --max-time 10 https://api.openpersona.online/healthz | grep -q '"status":"ok"'; then
              echo "healthz ok"
              exit 0
            fi
            echo "waiting for healthz to flip green ($i/6)…"
            sleep 10
          done
          echo "::error::healthz did not flip green within 60s after deploy"
          exit 1

  deploy-voice:
    # Same gate as deploy-api: only on a green CI run on main, or a manual
    # workflow_dispatch (github.event.workflow_run is null then).
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    concurrency:
      # Separate group from deploy-api: voice and api serialise INDEPENDENTLY,
      # so a slow voice cold start never blocks an api deploy and vice versa.
      group: deploy-voice
      cancel-in-progress: false
    steps:
      - name: Checkout the commit CI verified
        uses: actions/checkout@v4
        with:
          # Pin to the exact SHA that just passed CI (same reasoning as the api
          # job) so a deploy can never race ahead of its checks.
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - uses: superfly/flyctl-actions/setup-flyctl@master

      # Remote build from the repo root (default CWD) so the build daemon gets
      # the full workspace tree — the voice Dockerfile's `COPY packages/<member>/`
      # paths require the repo root as build context. fly.toml lives at
      # packages/voice/fly.toml (next to the Dockerfile); $WORKSPACE makes the
      # --config path absolute.
      #
      # NOTE on FLY_API_TOKEN: this reuses the same secret as deploy-api, so the
      # token MUST be org-scoped (or at least authorised for open-persona-voice).
      # An api-app-scoped token 401s here. See the one-time-setup header.
      #
      # --wait-timeout is deliberately generous (900s). Voice cold start loads
      # the bge-small embedder + Silero VAD on CPU BEFORE the uvicorn listener
      # binds; on a shared VM that is minutes, not seconds (fly.toml's TCP check
      # grace_period is 300s). flyctl waits on that TCP health check to pass, so
      # the wait must comfortably exceed the worst-case cold start.
      - name: flyctl deploy
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          WORKSPACE: ${{ github.workspace }}
        run: |
          flyctl deploy \
            --remote-only \
            --config "$WORKSPACE/packages/voice/fly.toml" \
            --app open-persona-voice \
            --strategy rolling \
            --wait-timeout 900

      # No public /healthz curl: voice's only HTTP routes are auth-gated (they
      # 401 unauthenticated), so there is no anonymous health probe. The
      # `flyctl deploy --wait-timeout` above already blocks until the machine's
      # TCP health check passes, so a successful deploy is itself the success
      # signal. This step is a non-fatal sanity confirmation that flyctl agrees
      # the machine is up, via `flyctl status` (no HTTP probe invented).
      - name: Confirm machine status
        if: success()
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          flyctl status --app open-persona-voice

  deploy-livekit:
    # Same gate as the other jobs: green CI on main, or a manual workflow_dispatch.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    concurrency:
      # Independent group: the SFU redeploys without blocking/being blocked by api
      # or voice.
      group: deploy-livekit
      cancel-in-progress: false
    steps:
      - name: Checkout the commit CI verified
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - uses: superfly/flyctl-actions/setup-flyctl@master

      # DIFFERENT build context from api/voice: the LiveKit Dockerfile COPYs its
      # OWN files (entrypoint.sh, livekit.yaml) with relative paths — NOT repo-root
      # `COPY packages/<member>/...`. So the build context must be packages/livekit/,
      # not the repo root. `working-directory` makes that the CWD, and the build
      # daemon receives that dir as context (fly.toml is read from the CWD).
      #
      # FLY_API_TOKEN must be org-scoped (same as the other jobs). The SFU starts
      # fast (thin livekit-server image, no embedder), so a short wait suffices.
      # The app/IPv4/LIVEKIT_KEYS are provisioned out-of-band; this only ships the
      # image.
      - name: flyctl deploy
        working-directory: packages/livekit
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          flyctl deploy \
            --remote-only \
            --config fly.toml \
            --app open-persona-livekit \
            --strategy rolling \
            --wait-timeout 300

      # Unlike voice, LiveKit serves an anonymous HTTP endpoint (Fly 443 → 7880),
      # so signaling reachability is directly probe-able — a real post-deploy check.
      - name: Smoke-test signaling
        run: |
          for i in 1 2 3 4 5 6; do
            if curl -fsS --max-time 10 https://open-persona-livekit.fly.dev/ >/dev/null; then
              echo "livekit signaling reachable"
              exit 0
            fi
            echo "waiting for livekit signaling ($i/6)…"
            sleep 10
          done
          echo "::error::livekit signaling did not respond within 60s after deploy"
          exit 1
