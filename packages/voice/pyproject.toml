[project]
name = "persona-voice"
version = "0.1.0"
description = "Real-time voice service for persona-core ŌĆö WebRTC transport via LiveKit OSS Server."
readme = "README.md"
requires-python = ">=3.11"
# Source-available, noncommercial use only. NOT OSI-approved.
# See LICENSE for full terms. Commercial use requires a separate license
# negotiated with the rights holder.
license = "PolyForm-Noncommercial-1.0.0"
license-files = ["LICENSE"]
authors = [
    { name = "Yasin Hessnawi", email = "yasinhessnawi1@gmail.com" },
]
keywords = [
    "ai",
    "persona",
    "voice",
    "webrtc",
    "livekit",
    "stt",
    "tts",
    "real-time",
]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: Other/Proprietary License",
    "Operating System :: POSIX",
    "Operating System :: MacOS",
    "Operating System :: POSIX :: Linux",
    "Programming Language :: Python",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Software Development :: Libraries",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Topic :: Multimedia :: Sound/Audio :: Speech",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Typing :: Typed",
]
dependencies = [
    # persona-core direct store access (D-V1-4) + the extracted JWT verifier
    # surface (D-V1-X-jwt-verifier-extraction lands at T03 inside persona-core).
    "persona-core[postgres]",
    # LiveKit OSS substrate per D-V1-1 (branch (A) lock 2026-06-07). The PyPI
    # name is `livekit` (NOT `livekit-rtc` ŌĆö decisions.md / tasks.md used the
    # historical alias). v1.1.10 is the Python Room / Participant / Track SDK;
    # Apache-2.0 per D-V1-X-livekit-sdk-license-stack. Transitive surface:
    # protobuf + types-protobuf + aiofiles + numpy ŌĆö all permissive.
    "livekit>=1.1,<2",
    # LiveKit server-side AccessToken issuance per D-V1-3 ŌĆö T04's
    # `POST /v1/voice/token` endpoint signs LiveKit JWTs with the API secret.
    # PyPI name is `livekit-api` (NOT `livekit-server-sdk-python`); v1.1.0.
    "livekit-api>=1.1,<2",
    # Deepgram streaming-STT SDK per Spec V2 D-V2-1 LOCK launch provider
    # (R-V2-1 audit: MIT-licensed; PEP 561 typed; transitive deps
    # `httpx` BSD-3 / `websockets` BSD-3 / `aiohttp` Apache-2.0 / `pydantic` MIT
    # / `dataclasses-json` MIT ŌĆö all permissive per
    # D-V1-X-livekit-sdk-license-stack precedent). Used only inside
    # `persona_voice.stt.deepgram_backend` per Spec 02 ChatBackend
    # adapter-boundary discipline.
    "deepgram-sdk>=4.0,<5",
    # Silero VAD ONNX-only path per Spec V2 D-V2-X-silero-implementation-shape
    # LOCK (3 pillars: ONNX-only + SileroFramer mandatory + lazy-construct +
    # explicit prewarm). `silero-vad-lite` is the preferred path ŌĆö MIT-licensed,
    # bundles the v5 `silero_vad.onnx` model weights + a C++ ONNX runtime
    # wrapper, single transitive (pytest dev-only), no torch (avoids the 200-500
    # MB transitive that the official `silero-vad` PyPI brings). 32 ms / 512-
    # sample window pinned at 16 kHz. Used only inside
    # `persona_voice.stt.vad_silero` per the Spec 02 ChatBackend adapter-
    # boundary discipline.
    "silero-vad-lite>=0.2,<1",
    "cartesia[websockets]>=3,<4",
]

[project.urls]
Homepage = "https://github.com/yasinhessnawi1/Open-Persona"
Repository = "https://github.com/yasinhessnawi1/Open-Persona"
Issues = "https://github.com/yasinhessnawi1/Open-Persona/issues"
Changelog = "https://github.com/yasinhessnawi1/Open-Persona/blob/main/CHANGELOG.md"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/persona_voice"]
include = [
    "src/persona_voice/py.typed",
]

[tool.uv.sources]
persona-core = { workspace = true }
