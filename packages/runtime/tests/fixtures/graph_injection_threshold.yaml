# Labelled relevant-vs-small-talk set for the K3 injection-threshold sweep
# (D-K3-3 refinement (a): validate inject_similarity_floor against the INJECTION
# decision — "is this node relevant enough to inject for THIS turn?" — not
# inherited from K0's semantic-link bar). Each entry pairs a turn's user message
# with a candidate user-knowledge node and the ground-truth label:
#   inject: true  — the node bears on the turn; injecting helps (a positive).
#   inject: false — small-talk / off-topic / loosely-related; injecting it would
#                   be stuffing (a negative — the failure the floor must prevent).
# The external sweep embeds (query, node.content) with the real bge-small
# embedder, takes cosine similarity as the score, and sweeps the floor for the
# F0.5-precision-biased operating point (stuffing degrades every turn → precision
# weighted over recall, the K0 house posture).

# --- relevant: the node bears on the turn (positives) ----------------------
- slice: relevant
  query: "Can you help me build a study plan? I lose concentration after about an hour."
  content: "Finds it hard to concentrate during long study sessions and gets distracted easily."
  inject: true
- slice: relevant
  query: "I want to cook dinner for a few friends this weekend — any menu ideas?"
  content: "Eats a vegetarian diet and avoids all meat and fish."
  inject: true
- slice: relevant
